# Fly.io deployment. `fly launch --no-deploy`, then `fly deploy`.
app = "payment-reconciliation"
primary_region = "bom"

[build]
  dockerfile = "Dockerfile"

[env]
  DATABASE_PATH = "/data/payments.db"
  SEED_FILE = "/app/data/sample_events.json"
  SEED_ON_STARTUP = "true"
  PORT = "8000"

[[mounts]]
  source = "sqlite_data"
  destination = "/data"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    grace_period = "20s"
    interval = "30s"
    method = "GET"
    path = "/health"
    timeout = "5s"
